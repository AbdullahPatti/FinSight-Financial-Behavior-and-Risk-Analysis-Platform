version: "3.9"

services:
  backend:
    build: .
    container_name: finsight_backend
    ports:
      - "8000:8000"
    volumes:
      - finsight_db:/app/data   # only mount the db volume, not the whole project
    environment:
      - PYTHONUNBUFFERED=1
      - API_KEY=${API_KEY}
    restart: unless-stopped

volumes:
  finsight_db: