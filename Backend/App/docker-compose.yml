version: "3.9"

services:
  backend:
    build: .
    container_name: finsight_backend
    ports:
      - "8000:8000"
    volumes:
      - finsight_db:/app
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - API_KEY=${API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
    restart: unless-stopped

volumes:
  finsight_db: